name: Deploy Firestore Rules and Indexes

# ⚠️ THIS REPO DOES NOT OWN FIREBASE HOSTING.
# nouvia-os.web.app is owned by github.com/nouvia-ai/nouvia-studio.
# Any hosting deploy from this repo WILL overwrite Nouvia Studio.
# Hosting step has been permanently removed. DO NOT ADD IT BACK.

on:
  push:
    branches:
      - main

jobs:
  deploy-firestore:
    name: Deploy Firestore Rules & Indexes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy Firestore Rules
        run: npx firebase-tools deploy --only firestore:rules --project nouvia-os --non-interactive

      - name: Deploy Firestore Indexes
        continue-on-error: true
        run: npx firebase-tools deploy --only firestore:indexes --project nouvia-os --non-interactive
