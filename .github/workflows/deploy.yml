name: Deploy Firestore Indexes

# ⚠️ THIS REPO DOES NOT OWN FIREBASE HOSTING OR FIRESTORE RULES.
# nouvia-os.web.app and firestore.rules are owned by github.com/nouvia-ai/nouvia-studio.
# This repo deploys INDEXES ONLY. Rules are managed exclusively by nouvia-studio
# to prevent rule overwrites from two repos competing.

on:
  push:
    branches:
      - main
    paths:
      - 'firestore.indexes.json'

jobs:
  deploy-indexes:
    name: Deploy Firestore Indexes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy Firestore Indexes
        run: npx firebase-tools deploy --only firestore:indexes --project nouvia-os --non-interactive
