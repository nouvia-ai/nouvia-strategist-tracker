name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project nouvia-os --non-interactive

      - name: Deploy Firestore Rules
        continue-on-error: true
        run: npx firebase-tools deploy --only firestore:rules --project nouvia-os --non-interactive

      - name: Deploy Firestore Indexes
        continue-on-error: true
        run: npx firebase-tools deploy --only firestore:indexes --project nouvia-os --non-interactive
