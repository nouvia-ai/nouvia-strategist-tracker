name: Deploy Delivery Orchestrator

on:
  push:
    branches: [main]
    paths: ['services/delivery-orchestrator/**']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy delivery-orchestrator \
            --source services/delivery-orchestrator \
            --project nouvia-os \
            --region us-central1 \
            --allow-unauthenticated \
            --memory 1Gi \
            --timeout 120 \
            --quiet
